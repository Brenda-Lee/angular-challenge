<div class="user-card">
  <mat-icon class="avatar" aria-hidden="true">person</mat-icon>
  <span class="name">{{ user.nome }}</span>
  <span class="email">{{ user.email }}</span>
  <button
    mat-icon-button
    class="edit"
    type="button"
    [attr.aria-label]="'Editar ' + user.nome"
    (click)="onEdit()"
  >
    <mat-icon>edit</mat-icon>
  </button>
</div>
